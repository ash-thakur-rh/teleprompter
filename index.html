<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-dim: #1a3a5c;
    --blockquote-text: #ccc;
    --strong-text: #fff;
    --em-text: #bbb;
  }

  .light {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --border: #ddd;
    --text: #1a1a1a;
    --text-dim: #666;
    --accent: #0066cc;
    --accent-dim: #e0efff;
    --blockquote-text: #444;
    --strong-text: #000;
    --em-text: #555;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- INPUT SCREEN ---------- */
  .input-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 2rem;
    gap: 1.5rem;
  }

  .input-screen h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .input-screen p {
    color: var(--text-dim);
    font-size: 0.95rem;
    max-width: 500px;
    text-align: center;
    line-height: 1.5;
  }

  .input-methods {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
    width: 100%;
  }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    flex: 1;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s;
  }

  .input-card:hover { border-color: var(--accent); }

  .input-card h2 {
    font-size: 1.1rem;
    font-weight: 500;
  }

  .input-card label,
  .input-card button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.65rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: opacity 0.2s;
  }

  .input-card label:hover,
  .input-card button:hover { opacity: 0.85; }

  #file-input { display: none; }

  #url-input {
    width: 100%;
    padding: 0.6rem 0.8rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.9rem;
  }

  .or-divider {
    width: 100%;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 0.5rem;
  }

  #paste-area {
    width: 100%;
    min-height: 120px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    padding: 0.8rem;
    resize: vertical;
  }

  .separator-setting {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  #separator-input {
    width: 100px;
    padding: 0.4rem 0.6rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9rem;
    text-align: center;
  }

  .theme-toggle {
    position: absolute;
    top: 1.2rem;
    right: 1.5rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* ---------- PROMPTER SCREEN ---------- */
  .prompter-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  .prompter-screen.active { display: flex; }
  .input-screen.hidden { display: none; }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .section-counter {
    font-size: 0.95rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .progress-bar-track {
    flex: 1;
    max-width: 300px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 1.5rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .top-bar-actions {
    display: flex;
    gap: 0.5rem;
  }

  .top-bar-actions button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .top-bar-actions button:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Content area */
  .content-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 6rem;
    overflow-y: auto;
  }

  .section-content {
    max-width: 900px;
    width: 100%;
    font-size: 1.8rem;
    line-height: 1.6;
    font-weight: 300;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-content h1 { font-size: 2.6rem; font-weight: 400; margin-bottom: 0.5em; color: var(--accent); }
  .section-content h2 { font-size: 2.2rem; font-weight: 400; margin-bottom: 0.4em; color: var(--accent); }
  .section-content h3 { font-size: 1.9rem; font-weight: 400; margin-bottom: 0.4em; color: var(--accent); }
  .section-content p { margin-bottom: 0.8em; }
  .section-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 1.2em;
    margin: 0.8em 0;
    color: var(--blockquote-text);
  }
  .section-content code {
    background: var(--surface);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    font-size: 0.85em;
  }
  .section-content pre {
    background: var(--surface);
    padding: 1em;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.8em 0;
    font-size: 0.75em;
  }
  .section-content ul, .section-content ol { margin-left: 1.2em; margin-bottom: 0.8em; }
  .section-content li { margin-bottom: 0.3em; }
  .section-content strong { font-weight: 600; color: var(--strong-text); }
  .section-content em { color: var(--em-text); }
  .section-content table { border-collapse: collapse; width: 100%; margin: 0.8em 0; font-size: 0.85em; }
  .section-content th, .section-content td { border: 1px solid var(--border); padding: 0.4em 0.8em; text-align: left; }
  .section-content th { background: var(--surface); }

  /* Bottom nav */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.8rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    min-width: 100px;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .nav-hint {
    color: var(--text-dim);
    font-size: 0.75rem;
  }

  /* Font size classes */
  .font-sm .section-content { font-size: 1.4rem; }
  .font-sm .section-content h1 { font-size: 2rem; }
  .font-sm .section-content h2 { font-size: 1.7rem; }
  .font-sm .section-content h3 { font-size: 1.5rem; }

  .font-md .section-content { font-size: 1.8rem; }

  .font-lg .section-content { font-size: 2.4rem; line-height: 1.7; }
  .font-lg .section-content h1 { font-size: 3.2rem; }
  .font-lg .section-content h2 { font-size: 2.8rem; }
  .font-lg .section-content h3 { font-size: 2.4rem; }

  .font-xl .section-content { font-size: 3rem; line-height: 1.7; }
  .font-xl .section-content h1 { font-size: 4rem; }
  .font-xl .section-content h2 { font-size: 3.5rem; }
  .font-xl .section-content h3 { font-size: 3rem; }

  /* Mirror mode */
  .mirror .content-area { transform: scaleX(-1); }

  @media (max-width: 768px) {
    .content-area { padding: 2rem 1.5rem; }
    .section-content { font-size: 1.4rem; }
    .input-methods { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- INPUT SCREEN -->
<div class="input-screen" id="inputScreen">
  <button class="theme-toggle" id="inputThemeBtn" title="Toggle light/dark theme">Light</button>
  <h1>TELEPROMPTER</h1>
  <p>Load a markdown file with sections separated by a delimiter. Each section will be shown one at a time in large, readable text.</p>

  <div class="separator-setting">
    <label for="separator-input">Section separator:</label>
    <input type="text" id="separator-input" value="---" placeholder="---">
  </div>

  <div class="input-methods">
    <div class="input-card">
      <h2>Upload File</h2>
      <label for="file-input">Choose .md file</label>
      <input type="file" id="file-input" accept=".md,.txt,.markdown">
      <div class="or-divider">or load from URL</div>
      <input type="text" id="url-input" placeholder="https://raw.githubusercontent.com/...">
      <button id="url-load-btn">Load URL</button>
    </div>

    <div class="input-card">
      <h2>Paste Content</h2>
      <textarea id="paste-area" placeholder="Paste your markdown here..."></textarea>
      <button id="paste-load-btn">Start</button>
    </div>
  </div>
</div>

<!-- PROMPTER SCREEN -->
<div class="prompter-screen font-md" id="prompterScreen">
  <div class="top-bar">
    <span class="section-counter" id="sectionCounter">1 / 1</span>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="top-bar-actions">
      <button id="fontDownBtn" title="Decrease font">A-</button>
      <button id="fontUpBtn" title="Increase font">A+</button>
      <button id="themeBtn" title="Toggle light/dark theme">Light</button>
      <button id="mirrorBtn" title="Mirror mode">Mirror</button>
      <button id="backBtn" title="Back to input">Exit</button>
    </div>
  </div>

  <div class="content-area">
    <div class="section-content" id="sectionContent"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn" id="prevBtn">&larr; Prev</button>
    <span class="nav-hint">Arrow keys or swipe</span>
    <button class="nav-btn" id="nextBtn">Next &rarr;</button>
  </div>
</div>

<script>
  const inputScreen = document.getElementById('inputScreen');
  const prompterScreen = document.getElementById('prompterScreen');
  const sectionContent = document.getElementById('sectionContent');
  const sectionCounter = document.getElementById('sectionCounter');
  const progressFill = document.getElementById('progressFill');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let sections = [];
  let currentIndex = 0;
  const fontSizes = ['font-sm', 'font-md', 'font-lg', 'font-xl'];
  let fontIndex = 1;

  function parseSections(md) {
    const sep = document.getElementById('separator-input').value || '---';
    const escaped = sep.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return md
      .split(new RegExp('\\n' + escaped + '\\n'))
      .map(s => s.trim())
      .filter(s => s.length > 0);
  }

  function renderSection(idx) {
    currentIndex = Math.max(0, Math.min(idx, sections.length - 1));
    sectionContent.innerHTML = marked.parse(sections[currentIndex]);
    sectionCounter.textContent = `${currentIndex + 1} / ${sections.length}`;
    progressFill.style.width = `${((currentIndex + 1) / sections.length) * 100}%`;
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === sections.length - 1;
    document.querySelector('.content-area').scrollTop = 0;
  }

  function startPrompter(md) {
    sections = parseSections(md);
    if (sections.length === 0) { alert('No sections found. Separate sections with ---'); return; }
    inputScreen.classList.add('hidden');
    prompterScreen.classList.add('active');
    renderSection(0);
  }

  // File upload
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    file.text().then(startPrompter);
  });

  // URL load
  document.getElementById('url-load-btn').addEventListener('click', () => {
    let url = document.getElementById('url-input').value.trim();
    if (!url) return;
    // Convert GitHub blob URLs to raw
    url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(startPrompter)
      .catch(err => alert('Failed to load URL: ' + err.message));
  });

  // Paste
  document.getElementById('paste-load-btn').addEventListener('click', () => {
    const text = document.getElementById('paste-area').value;
    if (text.trim()) startPrompter(text);
  });

  // Navigation
  prevBtn.addEventListener('click', () => renderSection(currentIndex - 1));
  nextBtn.addEventListener('click', () => renderSection(currentIndex + 1));

  document.addEventListener('keydown', e => {
    if (!prompterScreen.classList.contains('active')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault();
      renderSection(currentIndex + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      renderSection(currentIndex - 1);
    } else if (e.key === 'Home') {
      renderSection(0);
    } else if (e.key === 'End') {
      renderSection(sections.length - 1);
    }
  });

  // Touch swipe
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
  document.addEventListener('touchend', e => {
    if (!prompterScreen.classList.contains('active')) return;
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 60) renderSection(currentIndex + (dx < 0 ? 1 : -1));
  });

  // Font size
  document.getElementById('fontDownBtn').addEventListener('click', () => {
    if (fontIndex > 0) {
      prompterScreen.classList.remove(fontSizes[fontIndex]);
      fontIndex--;
      prompterScreen.classList.add(fontSizes[fontIndex]);
    }
  });
  document.getElementById('fontUpBtn').addEventListener('click', () => {
    if (fontIndex < fontSizes.length - 1) {
      prompterScreen.classList.remove(fontSizes[fontIndex]);
      fontIndex++;
      prompterScreen.classList.add(fontSizes[fontIndex]);
    }
  });

  // Theme toggle
  const themeBtn = document.getElementById('themeBtn');
  const inputThemeBtn = document.getElementById('inputThemeBtn');
  function toggleTheme() {
    document.body.classList.toggle('light');
    const label = document.body.classList.contains('light') ? 'Dark' : 'Light';
    themeBtn.textContent = label;
    inputThemeBtn.textContent = label;
  }
  themeBtn.addEventListener('click', toggleTheme);
  inputThemeBtn.addEventListener('click', toggleTheme);

  // Mirror
  document.getElementById('mirrorBtn').addEventListener('click', () => {
    prompterScreen.classList.toggle('mirror');
  });

  // Exit
  document.getElementById('backBtn').addEventListener('click', () => {
    prompterScreen.classList.remove('active');
    inputScreen.classList.remove('hidden');
  });
</script>
</body>
</html>
